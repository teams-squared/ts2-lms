databases:
  - name: ts2-lms-db
    plan: free
    databaseName: ts2_lms
    user: ts2_lms_user

services:
  - type: web
    name: ts2-lms
    runtime: node
    plan: pro
    buildCommand: npm install && npx prisma generate && npm run build
    # Demo users (admin@teamssquared.com etc.) used to be seeded here on
    # every deploy via `npx tsx prisma/seed.ts`. Removed: those accounts
    # were a backdoor risk and prod doesn't need test data. Real admins
    # are invited via /admin/users like everyone else.
    startCommand: npx tsx prisma/migrate.ts && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ts2-lms-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: AUTH_URL
        sync: false
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: AZURE_AD_CLIENT_ID
        sync: false
      - key: AZURE_AD_CLIENT_SECRET
        sync: false
      - key: AZURE_AD_TENANT_ID
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: CRON_SECRET
        sync: false
