databases:
  - name: ts2-lms-db
    plan: free
    databaseName: ts2_lms
    user: ts2_lms_user

services:
  - type: web
    name: ts2-lms
    runtime: node
    plan: pro
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx tsx prisma/migrate.ts && npx tsx prisma/seed.ts && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ts2-lms-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: AUTH_URL
        sync: false
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: AZURE_AD_CLIENT_ID
        sync: false
      - key: AZURE_AD_CLIENT_SECRET
        sync: false
      - key: AZURE_AD_TENANT_ID
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: CRON_SECRET
        sync: false

  - type: cron
    name: ts2-lms-deadline-reminders
    runtime: image
    image:
      url: curlimages/curl:8.10.1
    schedule: "30 3 * * *"
    envVars:
      - key: CRON_SECRET
        sync: false
      - key: APP_URL
        value: https://learn.teamsquared.io
    buildCommand: ""
    startCommand: >
      curl -fsS -H "Authorization: Bearer $CRON_SECRET"
      "$APP_URL/api/cron/deadline-reminders"
