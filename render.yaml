databases:
  - name: ts2-lms-db
    plan: free
    databaseName: ts2_lms
    user: ts2_lms_user

services:
  - type: web
    name: ts2-lms
    runtime: node
    plan: starter
    buildCommand: npm install && npx prisma generate && npm run build
    # Demo users (admin@teamssquared.com etc.) used to be seeded here on
    # every deploy via `npx tsx prisma/seed.ts`. Removed: those accounts
    # were a backdoor risk and prod doesn't need test data. Real admins
    # are invited via /admin/users like everyone else.
    #
    # Schema migrations: prod applies COMMITTED migration files via
    # `prisma migrate deploy`. Any schema.prisma change MUST ship a matching
    # prisma/migrations/<timestamp>_<name>/migration.sql, or the column won't
    # exist in prod even though the generated client queries it. The custom
    # idempotent prisma/migrate.ts script is only used by the separate
    # ts2-lms-staging service (branch dev) — not prod.
    startCommand: npx prisma migrate deploy && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ts2-lms-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: AUTH_URL
        sync: false
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: AZURE_AD_CLIENT_ID
        sync: false
      - key: AZURE_AD_CLIENT_SECRET
        sync: false
      - key: AZURE_AD_TENANT_ID
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: CRON_SECRET
        sync: false
      # Security audit-log retention window (ISO 27001 A.5.33). Mirrors the
      # documented period in the ISMS retention register; bump here if that
      # period changes. Scoped to AuditLog only — ack evidence in
      # LessonProgress is never pruned. Cron: prune-audit-logs.yml (weekly).
      - key: AUDIT_LOG_RETENTION_DAYS
        value: "365"
      # Session idle timeout in seconds (ISO 27001 A.8.5). Sliding JWT window.
      # Default 8h = re-auth roughly once per working day.
      - key: SESSION_MAX_AGE_SECONDS
        value: "28800"
