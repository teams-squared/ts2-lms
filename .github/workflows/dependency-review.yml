name: Dependency Review

on:
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Fail on High (CVSS ≥ 7.0) or Critical vulnerabilities.
          fail-on-severity: high

          # Allowlist of licences compatible with a private commercial app.
          # Anything outside this set (e.g. AGPL, LGPL, CC-BY-SA) fails CI
          # loudly so we can decide consciously whether to add it. This
          # replaces the deprecated `deny-licenses` (denylist) approach.
          allow-licenses: >-
            0BSD, Apache-2.0, BlueOak-1.0.0, BSD-2-Clause, BSD-3-Clause,
            CC0-1.0, ISC, MIT, MPL-2.0, Python-2.0, Unlicense, WTFPL

          # Post a summary comment on the PR (requires pull-requests: write).
          comment-summary-in-pr: always
