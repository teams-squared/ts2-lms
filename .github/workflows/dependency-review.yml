name: Dependency Review

on:
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Fail on High (CVSS ≥ 7.0) or Critical vulnerabilities.
          fail-on-severity: high

          # Deny licences incompatible with a private commercial application:
          # AGPL requires source disclosure for networked apps; LGPL requires
          # dynamic linking or source distribution; CC-BY-SA is ShareAlike.
          deny-licenses: AGPL-3.0, LGPL-2.0, LGPL-2.1, LGPL-3.0, CC-BY-SA-4.0

          # Post a summary comment on the PR (requires pull-requests: write).
          comment-summary-in-pr: always
